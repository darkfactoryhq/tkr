name: Bug report
description: Report something that isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug! Please fill out the details
        below so we can reproduce and fix it quickly.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, including what you expected instead.
      placeholder: Running `tkr next` returned a blocked ticket...
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: The exact commands you ran, in order.
      placeholder: |
        1. tkr init
        2. tkr new -t "A" -p high
        3. tkr next
      render: shell
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: tkr version
      description: Output of `tkr version`.
      placeholder: tkr v0.1.0 (commit: abc1234, built: 2026-06-28)
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS / arch
      placeholder: macOS 15.3 arm64
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant output or logs
      description: Paste any error output. Re-run with `--plain` if it helps.
      render: shell
    validations:
      required: false
