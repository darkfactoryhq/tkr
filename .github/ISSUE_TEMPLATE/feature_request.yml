name: Feature request
description: Suggest an idea or enhancement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the use case or pain point. Focus on the "why".
      placeholder: When an agent runs `tkr next` I want it to...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like tkr to do? CLI shape, flags, output, etc.
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches or workarounds you've thought about.
    validations:
      required: false
  - type: checkboxes
    id: scope
    attributes:
      label: Fit
      options:
        - label: This keeps tkr git-resident and Markdown-native (no server/database)
          required: false
