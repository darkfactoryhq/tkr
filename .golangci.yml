version: "2"

linters:
  default: standard
  settings:
    errcheck:
      exclude-functions:
        - fmt.Fprintf
        - fmt.Fprintln
        - fmt.Fprint
        - (fmt.State).Write
        - (*strings.Builder).WriteString
        - (*strings.Builder).Write
        - (*bytes.Buffer).WriteString
        - (*bytes.Buffer).Write
